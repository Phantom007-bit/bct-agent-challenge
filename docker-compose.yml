version: '3.8'

services:
  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - gateway
    networks:
      - bct_network

  gateway:
    build: ./gateway
    ports:
      - "3000:3000"
    environment:
      # Directing traffic to the backend service container running on port 8000
      - AI_SERVICE_URL=http://ai_service:8000
    depends_on:
      - ai_service
    networks:
      - bct_network

  ai_service:
    # Build context is the current root directory where main.py lives
    build: . 
    # Point explicitly to the root Dockerfile for the Python environment
    dockerfile: Dockerfile 
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    networks:
      - bct_network

networks:
  bct_network:
    driver: bridge